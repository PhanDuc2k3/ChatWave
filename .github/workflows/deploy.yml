name: Deploy ChatWave

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /var/www/ChatWave
            git pull origin main

            cd /var/www/ChatWave/core-service
            npm install
            pm2 restart chatwave-core

            cd /var/www/ChatWave/realtime-service
            npm install
            pm2 restart chatwave-realtime

            cd /var/www/ChatWave/chatbot-service
            npm install
            pm2 restart chatwave-chatbot

            pm2 save
